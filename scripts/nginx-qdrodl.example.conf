# Copy to /etc/nginx/sites-available/qdrodl (Debian/Ubuntu) and symlink:
#   sudo ln -s /etc/nginx/sites-available/qdrodl /etc/nginx/sites-enabled/
# Replace qdrodl.app and SSL paths with your certbot output.
#
# After certbot --nginx, it often patches this file for you automatically.

# Security headers are set by Next.js in production (lib/securityHeaders.js).
# Do not duplicate the same headers here unless Next is bypassed for some paths.

server {
    listen 80;
    listen [::]:80;
    server_name qdrodl.app www.qdrodl.app;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
